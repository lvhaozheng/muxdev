command_dialects:
  codex:
    prefix: "$"
    colon: "-"
  opencode:
    prefix: "/"
    colon: "-"
  cursor:
    prefix: "/"
    colon: "-"
workflow_plugins:
  void:
    description: Plain provider session with no spec-driven command injection.
    best_for:
      - Direct provider sessions where the human already knows the exact next step.
      - Low ceremony exploration that still keeps muxdev safety and evidence boundaries.
    phases: [running]
    supported_providers: [mock, codex, claude-code, qwen, kimi, trae, antigravity]
    commands:
      running: "{task}"
    prompts:
      running: |
        Run the task directly while respecting muxdev safety, evidence, and workspace boundaries.
    artifacts: {}
    notes: Inspired by agtx's void workflow template for full human control.
  muxdev:
    description: Default muxdev design, approve, implement, test, review workflow.
    best_for:
      - Standard implementation work that benefits from plan, approval, test, review, and fix loops.
      - Risk-aware delivery where evidence and blocker handling should be explicit.
    phases: [design, implement, test, review, fix]
    supported_providers: [mock, codex, claude-code, qwen, kimi]
    commands:
      design: "/muxdev:design {task}"
      implement: "/muxdev:implement {task}"
      test: "/muxdev:test {task}"
      review: "/muxdev:review {task}"
      fix: "/muxdev:fix {task}"
    prompts:
      design: |
        Produce the design brief, acceptance criteria, risks, and implementation plan for: {task}
      implement: |
        Implement the approved plan for: {task}
      test: |
        Verify the implementation with targeted tests and report evidence for: {task}
      review: |
        Review the delivered change for blockers, regressions, and missing tests for: {task}
      fix: |
        Fix review blockers and preserve existing behavior for: {task}
    artifacts:
      design: plan.md
      test: test.log
      review: review.md
      fix: diff.patch
    notes: Maps muxdev's built-in DAG to a reusable phase catalog.
  spec-lite:
    description: Small spec-driven workflow for projects that want planning artifacts before implementation.
    best_for:
      - Small to medium tasks where a concise spec should exist before code changes.
      - Repository changes that need research notes, acceptance criteria, and a final review trail.
    phases: [research, planning, running, review]
    supported_providers: [codex, claude-code, qwen, kimi]
    commands:
      research: "/spec-lite:research {task}"
      planning: "/spec-lite:plan {task}"
      running: "/spec-lite:execute {task}"
      review: "/spec-lite:review {task}"
    prompts:
      research: |
        Gather repository facts, constraints, and unknowns before planning: {task}
      planning: |
        Convert research into a concise implementation plan with acceptance criteria: {task}
      running: |
        Execute the plan in scoped steps and keep evidence for each claim: {task}
      review: |
        Review the implementation against the spec, tests, and residual risks: {task}
    artifacts:
      research: .muxdev/spec/research.md
      planning: .muxdev/spec/plan.md
      running: .muxdev/spec/summary.md
      review: .muxdev/spec/review.md
    notes: A compact local analogue to spec-driven workflow templates such as spec-kit/OpenSpec.
  review-only:
    description: Read-only review workflow for parallel reviewer agents.
    best_for:
      - Independent read-only review of an existing change or plan.
      - Parallel reviewer fan-out where no agent should write to the workspace.
    phases: [review]
    supported_providers: [codex, claude-code, qwen, kimi]
    commands:
      review: "/muxdev:review {task}"
    prompts:
      review: |
        Perform a read-only review and lead with actionable blockers for: {task}
    artifacts:
      review: review.md
    notes: Useful for CAO-style parallel review fan-out.
