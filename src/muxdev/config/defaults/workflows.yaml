workflows:
  design:
    name: design
    max_parallel: 1
    stages:
      - id: task_intake
        role: requirements
        default_skills: ["requirements=default-requirements"]
        deps: []
        read_only: true
      - id: design_plan
        role: architect
        default_skills: ["plan=default-architect"]
        deps: [task_intake]
        read_only: true
        output_schema: PlanArtifact
      - id: design_review
        role: review
        default_skills: ["review=default-review"]
        deps: [design_plan]
        read_only: true
        output_schema: ReviewResult
      - id: design_verify
        type: delivery_gate
        role: review
        deps: [design_review]
        read_only: true
        output_schema: ReviewResult
        delivery_targets: [design_plan, design_review]
      - id: design_revise
        role: architect
        default_skills: ["plan=default-architect"]
        deps: [design_verify]
        read_only: true
        when: design_verify.has_blockers && loop < max_loops || plan_feedback.has_feedback
        max_loops: 2
        loop_review_stage: design_verify
        loop_reset_stages: [design_review, design_verify, design_revise]
        loop_restart_stage: design_review
      - id: approve_plan
        type: human_gate
        deps: [design_verify, design_revise]
        approval_type: plan
        approval_reason: approve reviewed design plan
      - id: design_pack
        role: docs
        default_skills: ["docs=default-docs"]
        deps: [approve_plan]
        read_only: true
