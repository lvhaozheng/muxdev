workflows:
  design:
    name: design
    max_parallel: 1
    stages:
      - id: problem_statement
        role: requirements
        deps: []
        read_only: true
      - id: requirements
        role: requirements
        deps: [problem_statement]
        read_only: true
      - id: architecture_options
        role: architect
        deps: [requirements]
        read_only: true
      - id: decision_record
        role: architect
        deps: [architecture_options]
        read_only: true
      - id: system_design
        role: architect
        deps: [decision_record]
        read_only: true
      - id: api_and_data_model
        role: architect
        deps: [system_design]
        read_only: true
      - id: risk_and_threat_model
        role: secure
        deps: [api_and_data_model]
        read_only: true
      - id: test_strategy
        role: test_strategy
        deps: [risk_and_threat_model]
        read_only: true
      - id: implementation_roadmap
        role: architect
        deps: [test_strategy]
        read_only: true
      - id: final_design_review
        role: review
        deps: [implementation_roadmap]
        read_only: true
      - id: memory_proposals
        role: memory_curator
        deps: [final_design_review]
        read_only: true
  design-lite:
    name: design-lite
    max_parallel: 1
    stages:
      - id: design_brief
        role: architect
        deps: []
        read_only: true
  dev:
    name: dev
    max_parallel: 1
    stages:
      - id: plan
        role: plan
        deps: []
        read_only: true
        output_schema: PlanArtifact
      - id: approve_plan
        type: human_gate
        deps: [plan]
      - id: code
        role: code
        deps: [approve_plan]
        allow_write: true
        checkpoint: true
      - id: test
        role: test
        deps: [code]
        allow_shell: true
        output_schema: TestResult
      - id: review
        role: review
        deps: [test]
        read_only: true
        output_schema: ReviewResult
      - id: fix
        role: code
        deps: [review]
        when: review.has_blockers && loop < 2
        allow_write: true
        max_loops: 2
  fix:
    name: fix
    max_parallel: 1
    stages:
      - id: code
        role: code
        deps: []
        allow_write: true
        checkpoint: true
      - id: test
        role: test
        deps: [code]
        allow_shell: true
        output_schema: TestResult
      - id: review
        role: review
        deps: [test]
        read_only: true
        output_schema: ReviewResult
  review:
    name: review
    max_parallel: 1
    stages:
      - id: review
        role: review
        deps: []
        read_only: true
        output_schema: ReviewResult
  test:
    name: test
    max_parallel: 1
    stages:
      - id: test
        role: test
        deps: []
        allow_shell: true
        output_schema: TestResult
  docs:
    name: docs
    max_parallel: 1
    stages:
      - id: docs
        role: docs
        deps: []
        allow_write: true
      - id: review
        role: review
        deps: [docs]
        read_only: true
  software-dev:
    name: software-dev
    max_parallel: 1
    stages:
      - id: design
        role: architect
        deps: []
        read_only: true
        output_schema: PlanArtifact
      - id: approve_plan
        type: human_gate
        deps: [design]
      - id: implement
        role: implementer
        deps: [approve_plan]
        allow_write: true
        checkpoint: true
      - id: test
        role: tester
        deps: [implement]
        allow_shell: true
        output_schema: TestResult
      - id: review
        role: reviewer
        deps: [test]
        read_only: true
        output_schema: ReviewResult
      - id: fix
        role: implementer
        deps: [review]
        when: review.has_blockers && loop < 2
        allow_write: true
        max_loops: 2
