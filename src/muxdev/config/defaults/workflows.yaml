        loop_restart_stage: design_review
      - id: approve_plan
        type: human_gate
        deps: [design_verify, design_revise]
        approval_type: plan
        approval_reason: approve lightweight design brief
      - id: design_pack
        role: docs
        default_skills: ["docs=default-docs"]
        deps: [approve_plan]
        read_only: true
