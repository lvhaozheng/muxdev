ui:
  slash_commands:
    /help: Show TUI commands
    /refresh: Refresh dashboard
    /run: Alias for /dev
    /dev: Start a dev workflow task
    /design: Start a design workflow task
    /fix: Start a fix workflow task
    /review: Start a review workflow task
    /test: Start a test workflow task
    /continue: Continue latest task
    /report: Show latest report
    /trace: Show recent trace events
    /providers: List provider status
    /provider doctor: Inspect one provider
    /agents: List role/provider assignments
    /skills: List installed skills
    /skill install: Install a local skill
    /usage: Show usage totals
    /new: Create a muxdev project
    /approvals: List pending approvals
    /approve: Approve an approval id
    /deny: Deny an approval id
    /actions: List pending provider CLI actions
    /action handled: Mark a provider action handled
    /action choose: Answer a provider or clarification action with a choice
    /action respond: Answer a provider or clarification action with text
    /action continue: Mark a provider action handled and continue
    /action dismiss: Dismiss a provider action
    /parallel: List open parallel-squad conflicts
    /learning: Show provider learning snapshots
    /repl: Open the muxdev REPL in another shell
    /quit: Exit TUI
    "!shell": Evaluate a shell command against policy
  quick_commands:
    run: muxdev dev "task" --provider mock
    continue: muxdev continue latest
    trace: muxdev trace view latest
    report: muxdev report latest
    attach: muxdev tui latest --attach implementer
    parallel: muxdev parallel conflicts
    learning: muxdev learning provider
