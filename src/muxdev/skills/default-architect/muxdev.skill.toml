version = 1

[activation]
roles = ["architect", "plan"]
stages = ["design", "design_plan", "design_brief", "design_revise"]
auto = true

[permissions]
read_workspace = true
write_workspace = false
shell = false
network = false
secrets = false

[delivery_gate]
checks = ["design_document_complete"]
required_evidence = ["stage_output"]

[trust]
risk_level = "low"
